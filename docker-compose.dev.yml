version: "3"
services:
  client:
    container_name: portfolio_client_dev
    restart: unless-stopped
    build:
      context: ./client
      dockerfile: Dockerfile.dev.yml
    volumes: 
      - ./client:/usr/src/app/client
    ports:
      - '80:3000'
    networks: 
      - frontend
    depends_on: 
      - server
  server:
    container_name: portfolio_server_dev
    restart: unless-stopped
    build:
      context: ./server
      dockerfile: Dockerfile.dev.yml
    volumes: 
      - ./server:/usr/src/app/server
    ports:
      - '5000:5000'
    networks: 
      - backend
      - frontend
    depends_on: 
      - mongodb
  mongodb:
    restart: unless-stopped
    image: mongo
    volumes:
      - ./database/dev/db:/data/db
    ports:
      - '27017:27017'
    networks: 
      - backend
      
networks: 
  frontend:
    driver: bridge
  backend:
    driver: bridge

