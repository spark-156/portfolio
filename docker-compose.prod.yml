version: "3.3"

services:
  website:
    # container_name: "frontend"
    restart: unless-stopped
    build: 
      context: frontend
      dockerfile: Dockerfile
    ports: 
      - 3000:3000
    volumes: 
      - ./frontend/:/usr/src/app/
      - /usr/src/app/node_modules
      - /usr/src/app/.next
    command: yarn start